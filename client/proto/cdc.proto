syntax = "proto3";

package cdc.v1;

option go_package = "github.com/foden/cdc/api/proto/v1;cdcpb";

import "google/api/annotations.proto";

//  CDC Service — Kafka-UI–style APIs for the CDC queue system.
service CDCService {

  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get : "/api/v1/health"
    };
  }

  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {
    option (google.api.http) = {
      get : "/api/v1/config"
    };
  }

  //  Dynamic Sources
  rpc AddSource(AddSourceRequest) returns (AddSourceResponse) {
    option (google.api.http) = {
      post : "/api/v1/sources"
      body : "*"
    };
  }

  rpc RemoveSource(RemoveSourceRequest) returns (RemoveSourceResponse) {
    option (google.api.http) = {
      delete : "/api/v1/sources/{instance_id}"
    };
  }

  //  Dynamic Sinks
  rpc AddSink(AddSinkRequest) returns (AddSinkResponse) {
    option (google.api.http) = {
      post : "/api/v1/sinks"
      body : "*"
    };
  }

  rpc RemoveSink(RemoveSinkRequest) returns (RemoveSinkResponse) {
    option (google.api.http) = {
      delete : "/api/v1/sinks/{type}"
    };
  }

  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {
    option (google.api.http) = {
      get : "/api/v1/stats"
    };
  }
}

// ... messages ...
message GetConfigRequest {}

message GetConfigResponse {
  AppConfig config = 1;
  repeated string available_sources = 2;
  repeated string available_sinks = 3;
}

message AppConfig {
  string name = 1;
  string log_mode = 2;
  repeated SourceConfig sources = 3;
  repeated SinkConfig sinks = 4;
}

message SourceConfig {
  string type = 1;
  string host = 2;
  int32 port = 3;
  optional string username = 4;
  optional string password = 5;
  string database = 6;
  repeated string tables = 7;
  optional string slot_name = 8;
  optional string publication_name = 9;
  optional string instance_id = 10;
}

message SinkConfig {
  string type = 1;
  repeated string url = 2;
  optional string username = 3;
  optional string password = 4;
  optional string index_prefix = 5;
  optional string index = 6;
  map<string, string> index_mapping = 7;
  optional int32 batch_size = 8;
  optional int32 flush_interval_ms = 9;
  optional int32 max_retries = 10;
  optional int32 retry_base_ms = 11;
  optional string api_key = 12;
}

//  Dynamic Operations
message AddSourceRequest { SourceConfig source = 1; }
message AddSourceResponse { string instance_id = 1; }

message RemoveSourceRequest { string instance_id = 1; }
message RemoveSourceResponse { bool success = 1; }

message AddSinkRequest { SinkConfig sink = 1; }
message AddSinkResponse { string type = 1; }

message RemoveSinkRequest { string type = 1; }
message RemoveSinkResponse { bool success = 1; }

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string version = 2;
  int64 uptime = 3; // seconds since start
}

message GetStatsRequest {}

message GetStatsResponse {
  map<string, ComponentStats> source_stats = 1;
  map<string, ComponentStats> sink_stats = 2;
}

message ComponentStats {
  uint64 success_count = 1;
  uint64 failure_count = 2;
  string last_error = 3;
}
