version: '3.8'

services:
  nats-1:
    image: nats:latest
    container_name: nats-node-1
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - cdc-network

  # --- CDC Application (Backend + UI) ---
  cdc-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdc-app
    ports:
      - "9090:9090"   # gRPC API
      - "9091:9091"   # REST API
      - "9092:9092"   # UI
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      - nats-1
    networks:
      - cdc-network

networks:
  cdc-network:
    driver: bridge
