syntax = "proto3";

package cdc.v1;

option go_package = "github.com/foden/cdc/api/proto/v1;cdcpb";

import "google/api/annotations.proto";

//  CDC Service — Kafka-UI–style APIs for the CDC queue system.
service CDCService {

  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get : "/api/v1/health"
    };
  }

  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {
    option (google.api.http) = {
      get : "/api/v1/config"
    };
  }

  //  Dynamic Sources
  rpc AddSource(AddSourceRequest) returns (AddSourceResponse) {
    option (google.api.http) = {
      post : "/api/v1/sources"
      body : "*"
    };
  }

  rpc RemoveSource(RemoveSourceRequest) returns (RemoveSourceResponse) {
    option (google.api.http) = {
      delete : "/api/v1/sources/{instance_id}"
    };
  }

  //  Dynamic Sinks
  rpc AddSink(AddSinkRequest) returns (AddSinkResponse) {
    option (google.api.http) = {
      post : "/api/v1/sinks"
      body : "*"
    };
  }

  rpc RemoveSink(RemoveSinkRequest) returns (RemoveSinkResponse) {
    option (google.api.http) = {
      delete : "/api/v1/sinks/{instance_id}"
    };
  }

  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {
    option (google.api.http) = {
      get : "/api/v1/stats"
    };
  }

  //  Explorer API
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse) {
    option (google.api.http) = {
      get : "/api/v1/messages"
    };
  }

  rpc GetConsumerInfo(GetConsumerInfoRequest)
      returns (GetConsumerInfoResponse) {
    option (google.api.http) = {
      get : "/api/v1/consumer"
    };
  }

  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse) {
    option (google.api.http) = {
      get : "/api/v1/topics"
    };
  }

  rpc ListPartitions(ListPartitionsRequest) returns (ListPartitionsResponse) {
    option (google.api.http) = {
      get : "/api/v1/partitions"
    };
  }
}

// ... messages ...
message GetConfigRequest {}

message GetConfigResponse {
  AppConfig config = 1;
  repeated string available_sources = 2;
  repeated string available_sinks = 3;
}

message AppConfig {
  string name = 1;
  string log_mode = 2;
  repeated SourceConfig sources = 3;
  repeated SinkConfig sinks = 4;
}

message SourceConfig {
  string type = 1;
  string host = 2;
  int32 port = 3;
  optional string username = 4;
  optional string password = 5;
  string database = 6;
  repeated string tables = 7;
  optional string slot_name = 8;
  optional string publication_name = 9;
  optional string instance_id = 10;
  optional string name = 11;  // Display name
  optional string topic = 12; // Routing topic
}

message SinkConfig {
  string type = 1;
  repeated string url = 2;
  optional string username = 3;
  optional string password = 4;
  optional string index_prefix = 5;
  optional string index = 6;
  map<string, string> index_mapping = 7;
  optional int32 batch_size = 8;
  optional int32 flush_interval_ms = 9;
  optional int32 max_retries = 10;
  optional int32 retry_base_ms = 11;
  optional string api_key = 12;
  optional string instance_id = 13; // Unique ID for sink
  optional string name = 14;        // Display name
  optional string topic = 15;       // Routing topic
}

//  Dynamic Operations
message AddSourceRequest { SourceConfig source = 1; }
message AddSourceResponse { string instance_id = 1; }

message RemoveSourceRequest { string instance_id = 1; }
message RemoveSourceResponse { bool success = 1; }

message AddSinkRequest { SinkConfig sink = 1; }
message AddSinkResponse { string instance_id = 1; }

message RemoveSinkRequest { string instance_id = 1; }
message RemoveSinkResponse { bool success = 1; }

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string version = 2;
  int64 uptime = 3; // seconds since start
}

message GetStatsRequest {}

message GetStatsResponse {
  map<string, ComponentStats> source_stats = 1;
  map<string, ComponentStats> sink_stats = 2;
}

message ComponentStats {
  uint64 success_count = 1;
  uint64 failure_count = 2;
  string last_error = 3;
}

// Advanced Explorer
message ListMessagesRequest {
  MessageStatus status = 1;
  optional string source_id = 2;
  optional string topic = 3;
  optional string partition = 4;
  OffsetPaginationRequest pagination = 5;
}

enum MessageStatus {
  MESSAGE_STATUS_UNSPECIFIED = 0;
  MESSAGE_STATUS_SENT = 1;
  MESSAGE_STATUS_UNSENT = 2;
}

message ListMessagesResponse {
  repeated MessageItem data = 1;
  uint64 total_count = 2;
  OffsetPaginationResponse pagination = 3;
}

message MessageItem {
  uint64 sequence = 1;
  string timestamp = 2;
  string subject = 3;
  bytes data = 4;
  map<string, string> headers = 5;
}

message GetConsumerInfoRequest { string consumer_name = 1; }

message GetConsumerInfoResponse {
  uint64 ack_floor = 1; // Highest sequence fully acknowledged
  uint64 pending_count = 2;
}

message ListTopicsRequest { OffsetPaginationRequest pagination = 1; }

message ListTopicsResponse {
  repeated TopicSummary data = 1;
  OffsetPaginationResponse pagination = 2;
}

message TopicSummary {
  string name = 1;
  uint64 message_count = 2;
  int32 partition_count = 3;
}

message ListPartitionsRequest {
  string topic = 1;
  OffsetPaginationRequest pagination = 2;
}

message ListPartitionsResponse {
  repeated PartitionSummary data = 1;
  OffsetPaginationResponse pagination = 2;
}

message PartitionSummary {
  string id = 1; // Full subject/partition name
  uint64 message_count = 2;
  string topic = 3;
}

message OffsetPaginationRequest {
  uint32 limit = 1;
  uint32 page = 2;
  repeated Sort sort = 3;
}

message Sort {
  string field = 1;
  SortOrder order = 2;
}

enum SortOrder {
  SORT_ORDER_UNSPECIFIED = 0;
  SORT_ORDER_ASC = 1;
  SORT_ORDER_DESC = 2;
}

message OffsetPaginationResponse {
  uint64 total_rows = 1;
  uint32 limit = 2;
  uint32 page = 3;
  bool has_next = 4;
  bool has_prev = 5;
  repeated Sort sort = 6;
}
